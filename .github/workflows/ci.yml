name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (Tesseract)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-spa

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python test/run_tests.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Ruff (optional)
        run: |
          pip show ruff >/dev/null 2>&1 && ruff check src/ test/ || echo "ruff not in deps — skipped"
